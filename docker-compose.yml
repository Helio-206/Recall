services:
  postgres:
    image: postgres:16-alpine
    container_name: recall-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-recall}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-recall}
      POSTGRES_DB: ${POSTGRES_DB:-recall}
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-recall} -d ${POSTGRES_DB:-recall}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: recall-redis
    restart: unless-stopped
    command: ["redis-server", "/usr/local/etc/redis/redis.conf"]
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
      - ./docker/redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  meilisearch:
    image: getmeili/meilisearch:v1.16
    container_name: recall-meilisearch
    restart: unless-stopped
    environment:
      MEILI_NO_ANALYTICS: "true"
      MEILI_MASTER_KEY: ${SEARCH_API_KEY:-}
    ports:
      - "7700:7700"
    volumes:
      - meili-data:/meili_data
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--spider", "http://127.0.0.1:7700/health"]
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./apps/api
    container_name: recall-api
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://recall:recall@postgres:5432/recall}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-change-me-before-production}
      BACKEND_CORS_ORIGINS: ${BACKEND_CORS_ORIGINS:-http://localhost:3000}
      INGESTION_QUEUE_NAME: ${INGESTION_QUEUE_NAME:-recall-ingestion}
      INGESTION_JOB_TIMEOUT_SECONDS: ${INGESTION_JOB_TIMEOUT_SECONDS:-900}
      INGESTION_RETRY_ATTEMPTS: ${INGESTION_RETRY_ATTEMPTS:-2}
      INGESTION_MAX_PLAYLIST_ITEMS: ${INGESTION_MAX_PLAYLIST_ITEMS:-100}
      YT_DLP_SOCKET_TIMEOUT_SECONDS: ${YT_DLP_SOCKET_TIMEOUT_SECONDS:-20}
      TRANSCRIPT_QUEUE_NAME: ${TRANSCRIPT_QUEUE_NAME:-recall-transcripts}
      TRANSCRIPT_JOB_TIMEOUT_SECONDS: ${TRANSCRIPT_JOB_TIMEOUT_SECONDS:-7200}
      TRANSCRIPT_RETRY_ATTEMPTS: ${TRANSCRIPT_RETRY_ATTEMPTS:-1}
      TRANSCRIPT_TMP_PATH: ${TRANSCRIPT_TMP_PATH:-/tmp/recall-transcripts}
      WHISPER_MODEL_NAME: ${WHISPER_MODEL_NAME:-base}
      WHISPER_LANGUAGE: ${WHISPER_LANGUAGE:-}
      WHISPER_FP16: ${WHISPER_FP16:-false}
      AI_PROVIDER: ${AI_PROVIDER:-auto}
      AI_PROMPT_VERSION: ${AI_PROMPT_VERSION:-phase4-v1}
      AI_QUEUE_NAME: ${AI_QUEUE_NAME:-ai-summary}
      AI_RETRY_ATTEMPTS: ${AI_RETRY_ATTEMPTS:-2}
      AI_JOB_TIMEOUT_SECONDS: ${AI_JOB_TIMEOUT_SECONDS:-480}
      AI_CHUNK_TARGET_CHARS: ${AI_CHUNK_TARGET_CHARS:-1800}
      AI_CHUNK_OVERLAP_SEGMENTS: ${AI_CHUNK_OVERLAP_SEGMENTS:-1}
      AI_REQUEST_TIMEOUT_SECONDS: ${AI_REQUEST_TIMEOUT_SECONDS:-45}
      AI_REQUEST_RETRIES: ${AI_REQUEST_RETRIES:-2}
      AI_RATE_LIMIT_PER_MINUTE: ${AI_RATE_LIMIT_PER_MINUTE:-20}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      OPENROUTER_BASE_URL: ${OPENROUTER_BASE_URL:-https://openrouter.ai/api/v1}
      OPENROUTER_MODEL: ${OPENROUTER_MODEL:-openai/gpt-oss-120b:free}
      OPENROUTER_FALLBACK_MODELS: ${OPENROUTER_FALLBACK_MODELS:-}
      OPENROUTER_APP_NAME: ${OPENROUTER_APP_NAME:-Recall}
      OPENROUTER_SITE_URL: ${OPENROUTER_SITE_URL:-http://localhost:3000}
      CURRICULUM_PROVIDER: ${CURRICULUM_PROVIDER:-auto}
      CURRICULUM_PROMPT_VERSION: ${CURRICULUM_PROMPT_VERSION:-phase6-v1}
      CURRICULUM_QUEUE_NAME: ${CURRICULUM_QUEUE_NAME:-curriculum-reconstruction}
      CURRICULUM_RETRY_ATTEMPTS: ${CURRICULUM_RETRY_ATTEMPTS:-1}
      CURRICULUM_JOB_TIMEOUT_SECONDS: ${CURRICULUM_JOB_TIMEOUT_SECONDS:-600}
      CURRICULUM_BATCH_SIZE: ${CURRICULUM_BATCH_SIZE:-6}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-}
      SEARCH_ENABLED: ${SEARCH_ENABLED:-true}
      SEARCH_BACKEND: ${SEARCH_BACKEND:-meilisearch}
      SEARCH_URL: ${SEARCH_URL:-http://meilisearch:7700}
      SEARCH_API_KEY: ${SEARCH_API_KEY:-}
      SEARCH_INDEX_UID: ${SEARCH_INDEX_UID:-learning-content}
    ports:
      - "${API_PORT:-8000}:8000"
    volumes:
      - ./apps/api/storage:/app/storage
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      meilisearch:
        condition: service_healthy

  worker:
    build:
      context: ./apps/api
    container_name: recall-worker
    restart: unless-stopped
    command:
      [
        "rq",
        "worker",
        "${INGESTION_QUEUE_NAME:-recall-ingestion}",
        "--url",
        "${REDIS_URL:-redis://redis:6379/0}",
      ]
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://recall:recall@postgres:5432/recall}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-change-me-before-production}
      BACKEND_CORS_ORIGINS: ${BACKEND_CORS_ORIGINS:-http://localhost:3000}
      INGESTION_QUEUE_NAME: ${INGESTION_QUEUE_NAME:-recall-ingestion}
      INGESTION_JOB_TIMEOUT_SECONDS: ${INGESTION_JOB_TIMEOUT_SECONDS:-900}
      INGESTION_RETRY_ATTEMPTS: ${INGESTION_RETRY_ATTEMPTS:-2}
      INGESTION_MAX_PLAYLIST_ITEMS: ${INGESTION_MAX_PLAYLIST_ITEMS:-100}
      YT_DLP_SOCKET_TIMEOUT_SECONDS: ${YT_DLP_SOCKET_TIMEOUT_SECONDS:-20}
      TRANSCRIPT_QUEUE_NAME: ${TRANSCRIPT_QUEUE_NAME:-recall-transcripts}
      TRANSCRIPT_JOB_TIMEOUT_SECONDS: ${TRANSCRIPT_JOB_TIMEOUT_SECONDS:-7200}
      TRANSCRIPT_RETRY_ATTEMPTS: ${TRANSCRIPT_RETRY_ATTEMPTS:-1}
      TRANSCRIPT_TMP_PATH: ${TRANSCRIPT_TMP_PATH:-/tmp/recall-transcripts}
      WHISPER_MODEL_NAME: ${WHISPER_MODEL_NAME:-base}
      WHISPER_LANGUAGE: ${WHISPER_LANGUAGE:-}
      WHISPER_FP16: ${WHISPER_FP16:-false}
      SEARCH_ENABLED: ${SEARCH_ENABLED:-true}
      SEARCH_BACKEND: ${SEARCH_BACKEND:-meilisearch}
      SEARCH_URL: ${SEARCH_URL:-http://meilisearch:7700}
      SEARCH_API_KEY: ${SEARCH_API_KEY:-}
      SEARCH_INDEX_UID: ${SEARCH_INDEX_UID:-learning-content}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      meilisearch:
        condition: service_healthy

  ai-worker:
    build:
      context: ./apps/api
    container_name: recall-ai-worker
    restart: unless-stopped
    command:
      [
        "rq",
        "worker",
        "${AI_QUEUE_NAME:-ai-summary}",
        "--url",
        "${REDIS_URL:-redis://redis:6379/0}",
      ]
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://recall:recall@postgres:5432/recall}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-change-me-before-production}
      BACKEND_CORS_ORIGINS: ${BACKEND_CORS_ORIGINS:-http://localhost:3000}
      AI_PROVIDER: ${AI_PROVIDER:-auto}
      AI_PROMPT_VERSION: ${AI_PROMPT_VERSION:-phase4-v1}
      AI_QUEUE_NAME: ${AI_QUEUE_NAME:-ai-summary}
      AI_RETRY_ATTEMPTS: ${AI_RETRY_ATTEMPTS:-2}
      AI_JOB_TIMEOUT_SECONDS: ${AI_JOB_TIMEOUT_SECONDS:-480}
      AI_CHUNK_TARGET_CHARS: ${AI_CHUNK_TARGET_CHARS:-1800}
      AI_CHUNK_OVERLAP_SEGMENTS: ${AI_CHUNK_OVERLAP_SEGMENTS:-1}
      AI_REQUEST_TIMEOUT_SECONDS: ${AI_REQUEST_TIMEOUT_SECONDS:-45}
      AI_REQUEST_RETRIES: ${AI_REQUEST_RETRIES:-2}
      AI_RATE_LIMIT_PER_MINUTE: ${AI_RATE_LIMIT_PER_MINUTE:-20}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      OPENROUTER_BASE_URL: ${OPENROUTER_BASE_URL:-https://openrouter.ai/api/v1}
      OPENROUTER_MODEL: ${OPENROUTER_MODEL:-openai/gpt-oss-120b:free}
      OPENROUTER_FALLBACK_MODELS: ${OPENROUTER_FALLBACK_MODELS:-}
      OPENROUTER_APP_NAME: ${OPENROUTER_APP_NAME:-Recall}
      OPENROUTER_SITE_URL: ${OPENROUTER_SITE_URL:-http://localhost:3000}
      CURRICULUM_PROVIDER: ${CURRICULUM_PROVIDER:-auto}
      CURRICULUM_PROMPT_VERSION: ${CURRICULUM_PROMPT_VERSION:-phase6-v1}
      CURRICULUM_QUEUE_NAME: ${CURRICULUM_QUEUE_NAME:-curriculum-reconstruction}
      CURRICULUM_RETRY_ATTEMPTS: ${CURRICULUM_RETRY_ATTEMPTS:-1}
      CURRICULUM_JOB_TIMEOUT_SECONDS: ${CURRICULUM_JOB_TIMEOUT_SECONDS:-600}
      CURRICULUM_BATCH_SIZE: ${CURRICULUM_BATCH_SIZE:-6}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-}
      SEARCH_ENABLED: ${SEARCH_ENABLED:-true}
      SEARCH_BACKEND: ${SEARCH_BACKEND:-meilisearch}
      SEARCH_URL: ${SEARCH_URL:-http://meilisearch:7700}
      SEARCH_API_KEY: ${SEARCH_API_KEY:-}
      SEARCH_INDEX_UID: ${SEARCH_INDEX_UID:-learning-content}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      meilisearch:
        condition: service_healthy

  curriculum-worker:
    build:
      context: ./apps/api
    container_name: recall-curriculum-worker
    restart: unless-stopped
    command:
      [
        "rq",
        "worker",
        "${CURRICULUM_QUEUE_NAME:-curriculum-reconstruction}",
        "--url",
        "${REDIS_URL:-redis://redis:6379/0}",
      ]
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://recall:recall@postgres:5432/recall}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-change-me-before-production}
      BACKEND_CORS_ORIGINS: ${BACKEND_CORS_ORIGINS:-http://localhost:3000}
      AI_REQUEST_TIMEOUT_SECONDS: ${AI_REQUEST_TIMEOUT_SECONDS:-45}
      AI_RATE_LIMIT_PER_MINUTE: ${AI_RATE_LIMIT_PER_MINUTE:-20}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      OPENROUTER_BASE_URL: ${OPENROUTER_BASE_URL:-https://openrouter.ai/api/v1}
      OPENROUTER_MODEL: ${OPENROUTER_MODEL:-openai/gpt-oss-120b:free}
      OPENROUTER_APP_NAME: ${OPENROUTER_APP_NAME:-Recall}
      OPENROUTER_SITE_URL: ${OPENROUTER_SITE_URL:-http://localhost:3000}
      CURRICULUM_PROVIDER: ${CURRICULUM_PROVIDER:-auto}
      CURRICULUM_PROMPT_VERSION: ${CURRICULUM_PROMPT_VERSION:-phase6-v1}
      CURRICULUM_QUEUE_NAME: ${CURRICULUM_QUEUE_NAME:-curriculum-reconstruction}
      CURRICULUM_RETRY_ATTEMPTS: ${CURRICULUM_RETRY_ATTEMPTS:-1}
      CURRICULUM_JOB_TIMEOUT_SECONDS: ${CURRICULUM_JOB_TIMEOUT_SECONDS:-600}
      CURRICULUM_BATCH_SIZE: ${CURRICULUM_BATCH_SIZE:-6}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-}
      SEARCH_ENABLED: ${SEARCH_ENABLED:-true}
      SEARCH_BACKEND: ${SEARCH_BACKEND:-meilisearch}
      SEARCH_URL: ${SEARCH_URL:-http://meilisearch:7700}
      SEARCH_API_KEY: ${SEARCH_API_KEY:-}
      SEARCH_INDEX_UID: ${SEARCH_INDEX_UID:-learning-content}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      meilisearch:
        condition: service_healthy

  transcript-worker:
    build:
      context: ./apps/api
    container_name: recall-transcript-worker
    restart: unless-stopped
    command:
      [
        "rq",
        "worker",
        "${TRANSCRIPT_QUEUE_NAME:-recall-transcripts}",
        "--url",
        "${REDIS_URL:-redis://redis:6379/0}",
      ]
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://recall:recall@postgres:5432/recall}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-change-me-before-production}
      BACKEND_CORS_ORIGINS: ${BACKEND_CORS_ORIGINS:-http://localhost:3000}
      TRANSCRIPT_QUEUE_NAME: ${TRANSCRIPT_QUEUE_NAME:-recall-transcripts}
      TRANSCRIPT_JOB_TIMEOUT_SECONDS: ${TRANSCRIPT_JOB_TIMEOUT_SECONDS:-7200}
      TRANSCRIPT_RETRY_ATTEMPTS: ${TRANSCRIPT_RETRY_ATTEMPTS:-1}
      TRANSCRIPT_TMP_PATH: ${TRANSCRIPT_TMP_PATH:-/tmp/recall-transcripts}
      WHISPER_MODEL_NAME: ${WHISPER_MODEL_NAME:-base}
      WHISPER_LANGUAGE: ${WHISPER_LANGUAGE:-}
      WHISPER_FP16: ${WHISPER_FP16:-false}
      SEARCH_ENABLED: ${SEARCH_ENABLED:-true}
      SEARCH_BACKEND: ${SEARCH_BACKEND:-meilisearch}
      SEARCH_URL: ${SEARCH_URL:-http://meilisearch:7700}
      SEARCH_API_KEY: ${SEARCH_API_KEY:-}
      SEARCH_INDEX_UID: ${SEARCH_INDEX_UID:-learning-content}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      meilisearch:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: recall-web
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000/api/v1}
    ports:
      - "3000:3000"
    depends_on:
      - api

volumes:
  meili-data:
  postgres-data:
  redis-data:
